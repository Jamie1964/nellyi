<!-- FILENAME: lifestyle.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lifestyle — Nelly Ihsayabok</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
    body { margin:0; background:#0d0d0d; color:#fff; font-family:Arial, sans-serif; }

    header { text-align:center; padding:40px 20px; }
    header h1 { font-size:42px; letter-spacing:3px; text-shadow:0 0 12px rgba(255,215,0,0.6); }
    header p { font-size:18px; color:#ccc; margin-top:10px; }

    .gallery {
        max-width:1200px; margin:40px auto; padding:0 20px;
        display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
        gap:25px;
    }

    .gallery img {
        width:100%; border-radius:10px; object-fit:cover;
        transition:0.3s ease;
    }
    .gallery img:hover { transform:scale(1.03); box-shadow:0 0 20px rgba(255,215,0,0.4); }

    .back-link { text-align:center; margin:50px 0; }
    .back-link a { color:#ffd700; font-size:20px; text-decoration:none; letter-spacing:1px; }

    footer { text-align:center; padding:20px; color:#666; font-size:14px; margin-top:40px; }
</style>
</head>

<body>

<header>
    <h1>Lifestyle</h1>
    <p>Natural • Candid • Everyday Moments</p>
</header>

<div class="gallery">
    <img src="./photos/lifestyle1.jpg">
    <img src="./photos/lifestyle2.jpg">
    <img src="./photos/lifestyle3.jpg">
    <img src="./photos/lifestyle4.jpg">
    <img src="./photos/lifestyle5.jpg">
</div>

<div class="back-link">
    <a href="gallery.html">← Back to Portfolio</a>
</div>

<footer>
    © 2026 Nelly Ihsayabok — All Rights Reserved
</footer>
<div id="page-counter" style="text-align:center; margin-top:40px; font-size:14px; color:#999;">
    Views: <span id="views"></span>
</div>

<script>
    const pageId = window.location.pathname;
    let count = localStorage.getItem("counter_" + pageId);

    if (!count) {
        count = 1;
    } else {
        count = parseInt(count) + 1;
    }

    localStorage.setItem("counter_" + pageId, count);
    document.getElementById("views").textContent = count;
</script>

</body>
</html>
